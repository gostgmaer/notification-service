name: Auto Tag on Merge

on:
  push:
    branches:
      - main

jobs:
  tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for tag detection

      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch          # default if no keyword found
          tag_prefix: v
          release_branches: main

      - name: Print new tag
        run: |
          echo "Previous tag : ${{ steps.tag.outputs.previous_tag }}"
          echo "New tag      : ${{ steps.tag.outputs.new_tag }}"
          echo "Bump type    : ${{ steps.tag.outputs.bump_type }}"
          echo "Changelog    : ${{ steps.tag.outputs.changelog }}"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          release_name: Release ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          draft: false
          prerelease: false
