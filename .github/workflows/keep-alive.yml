name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # ping every 5 minutes
  workflow_dispatch:          # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -f --max-time 10 ${{ secrets.RENDER_URL }}/v1/health/live \
            || echo "Ping failed — service may be cold starting"
