version: '3.9'

services:
  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/notification-service
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    networks:
      - notification-net

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - notification-net

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - notification-net

  # ── Kafka (enable with: docker compose --profile kafka up) ──────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    profiles: [kafka]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - notification-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    profiles: [kafka]
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    depends_on:
      - zookeeper
    networks:
      - notification-net

  # ── MailHog (enable with: docker compose --profile mailhog up) ──────────────
  mailhog:
    image: mailhog/mailhog:latest
    profiles: [mailhog]
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - notification-net

volumes:
  mongo-data:
  redis-data:

networks:
  notification-net:
    driver: bridge
